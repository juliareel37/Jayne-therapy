<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Therapy With Jayne is coming soon.">
    <title>Coming Soon | Therapy With Jayne</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="apple-touch-icon" href="assets/images/favicon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="coming-soon-page">
      <section class="coming-soon-hero" aria-labelledby="coming-soon-heading">
        <div class="container coming-soon-layout">
          <div class="coming-soon-copy stack">
            <h1 id="coming-soon-heading">
              <span class="coming-soon-kicker">Therapy With Jayne is</span>
              <span class="coming-soon-title">Coming Soon.</span>
            </h1>
            <!-- <p class="coming-soon-lede">
              A website for therapist Jayne Reel, LCSW, is currently in progress. Check back soon!
            </p> -->

            <section class="waitlist-section" aria-labelledby="waitlist-heading">
              <!-- <h2 id="waitlist-heading">Want to hear when it's live?</h2> -->
              <p>A website for therapist Jayne Reel, LCSW, is currently under construction. Enter your email address to be the first to know when it's up and running.</p>

              <form id="waitlist-form" class="waitlist-form">
                <div class="waitlist-input-row">
                  <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Your email"
                    autocomplete="email"
                    required
                  >

                  <button type="submit" id="waitlist-submit">
                    Notify Me
                  </button>
                </div>

                <input
                  type="text"
                  id="company"
                  name="company"
                  autocomplete="off"
                  tabindex="-1"
                  aria-hidden="true"
                  class="honeypot"
                >

                <p id="waitlist-message" class="waitlist-message" aria-live="polite"></p>
              </form>
            </section>

            <script>
              const waitlistForm = document.getElementById("waitlist-form");
              const waitlistEmail = document.getElementById("email");
              const waitlistCompany = document.getElementById("company");
              const waitlistMessage = document.getElementById("waitlist-message");
              const waitlistSubmit = document.getElementById("waitlist-submit");

              const WAITLIST_ENDPOINT = "https://jayne-therapy-waitlist-api.vercel.app/api/subscribe";

              function setMessage(text, type) {
                waitlistMessage.textContent = text;
                waitlistMessage.className = "waitlist-message";

                if (type) {
                  waitlistMessage.classList.add(type);
                }
              }

              waitlistForm.addEventListener("submit", async function (event) {
                event.preventDefault();

                const email = waitlistEmail.value.trim();

                if (!email) {
                  setMessage("Please enter your email address.", "error");
                  return;
                }

                waitlistSubmit.disabled = true;
                waitlistSubmit.textContent = "Submitting...";
                setMessage("", "");

                try {
                  const response = await fetch(WAITLIST_ENDPOINT, {
                    method: "POST",
                    headers: {
                      "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                      email: email,
                      company: waitlistCompany.value,
                      source: "github-pages-waitlist"
                    })
                  });

                  const result = await response.json();

                  if (!response.ok) {
                    setMessage(result.error || "Something went wrong. Please try again.", "error");
                    return;
                  }

                  setMessage("You're on the list.", "success");
                  waitlistForm.reset();
                } catch (error) {
                  setMessage("Could not submit. Please try again.", "error");
                } finally {
                  waitlistSubmit.disabled = false;
                  waitlistSubmit.textContent = "Notify Me";
                }
              });
            </script>
          </div>

          <div class="coming-soon-visual" aria-label="Portrait of Jayne Reel">
            <figure class="coming-soon-portrait">
              <img src="assets/images/Jayne-headshot.jpeg" alt="Jayne Reel">
            </figure>
            <span class="daisy daisy-large" aria-hidden="true"></span>
            <span class="daisy daisy-small" aria-hidden="true"></span>
            <span class="daisy daisy-tiny" aria-hidden="true"></span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
