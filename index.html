<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Therapy With Jayne is coming soon. Contact Jayne Reel, LCSW.">
    <title>Coming Soon | Therapy With Jayne</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="apple-touch-icon" href="assets/images/favicon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="coming-soon-page">
      <section class="coming-soon-hero" aria-labelledby="coming-soon-heading">
        <div class="container coming-soon-layout">
          <div class="coming-soon-copy stack">
            <h1 id="coming-soon-heading">
              <span class="coming-soon-kicker">Therapy With Jayne is</span>
              <span class="coming-soon-title">Coming Soon.</span>
            </h1>
            <!-- <p class="coming-soon-lede">
              A website for therapist Jayne Reel, LCSW, is currently in progress. Check back soon!
            </p> -->

            <section class="contact-section" aria-labelledby="contact-heading">
              <!-- <h2 id="contact-heading">Want to get in touch?</h2> -->
              <p>A website for therapist Jayne Reel, LCSW, is currently under construction. Check back soon for updates!</p>

              <button type="button" id="contact-toggle" class="contact-toggle" aria-controls="contact-modal" aria-expanded="false">
                Contact Jayne
              </button>

              <div id="contact-modal" class="contact-modal" role="dialog" aria-modal="true" aria-labelledby="contact-modal-heading" hidden>
                <div class="contact-modal-backdrop" data-contact-close></div>
                <div class="contact-modal-panel">
                  <div class="contact-modal-header">
                    <div>
                      <h3 id="contact-modal-heading">Contact Jayne</h3>
                      <p>Send a message and Jayne will follow up with you.</p>
                    </div>

                    <button type="button" class="contact-close" aria-label="Close contact form" data-contact-close>
                      <span aria-hidden="true">&times;</span>
                    </button>
                  </div>

                  <form id="contact-form" class="contact-form">
                    <div class="contact-field">
                      <label for="name">Name</label>
                      <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Your name"
                        autocomplete="name"
                        required
                      >
                    </div>

                    <div class="contact-field">
                      <label for="email">Email</label>
                      <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Your email"
                        autocomplete="email"
                        required
                      >
                    </div>

                    <div class="contact-field">
                      <label for="message">Message</label>
                      <textarea
                        id="message"
                        name="message"
                        placeholder="Your message"
                        rows="5"
                        required
                      ></textarea>
                    </div>

                    <input
                      type="text"
                      id="company"
                      name="company"
                      autocomplete="off"
                      tabindex="-1"
                      aria-hidden="true"
                      class="honeypot"
                    >

                    <button type="submit" id="contact-submit">
                      Send Message
                    </button>

                    <p id="contact-message" class="contact-message" aria-live="polite"></p>
                  </form>
                </div>
              </div>
            </section>

            <script>
              const contactToggle = document.getElementById("contact-toggle");
              const contactModal = document.getElementById("contact-modal");
              const contactForm = document.getElementById("contact-form");
              const contactName = document.getElementById("name");
              const contactEmail = document.getElementById("email");
              const contactMessageField = document.getElementById("message");
              const contactCompany = document.getElementById("company");
              const contactMessage = document.getElementById("contact-message");
              const contactSubmit = document.getElementById("contact-submit");

              const CONTACT_ENDPOINT = "https://jayne-therapy-waitlist-api.vercel.app/api/subscribe";

              function setMessage(text, type) {
                contactMessage.textContent = text;
                contactMessage.className = "contact-message";

                if (type) {
                  contactMessage.classList.add(type);
                }
              }

              function openContactModal() {
                contactModal.hidden = false;
                document.body.classList.add("modal-open");
                contactToggle.setAttribute("aria-expanded", "true");
                setMessage("", "");
                contactName.focus();
              }

              function closeContactModal() {
                contactModal.hidden = true;
                document.body.classList.remove("modal-open");
                contactToggle.setAttribute("aria-expanded", "false");
                contactToggle.focus();
              }

              function getModalFocusableElements() {
                return contactModal.querySelectorAll(
                  'button, input:not(.honeypot), textarea, select, a[href], [tabindex]:not([tabindex="-1"])'
                );
              }

              contactToggle.addEventListener("click", function () {
                openContactModal();
              });

              contactModal.addEventListener("click", function (event) {
                if (event.target.closest("[data-contact-close]")) {
                  closeContactModal();
                }
              });

              document.addEventListener("keydown", function (event) {
                if (event.key === "Escape" && !contactModal.hidden) {
                  closeContactModal();
                }

                if (event.key !== "Tab" || contactModal.hidden) {
                  return;
                }

                const focusableElements = getModalFocusableElements();
                const firstElement = focusableElements[0];
                const lastElement = focusableElements[focusableElements.length - 1];

                if (event.shiftKey && document.activeElement === firstElement) {
                  event.preventDefault();
                  lastElement.focus();
                } else if (!event.shiftKey && document.activeElement === lastElement) {
                  event.preventDefault();
                  firstElement.focus();
                }
              });

              contactForm.addEventListener("submit", async function (event) {
                event.preventDefault();

                const name = contactName.value.trim();
                const email = contactEmail.value.trim();
                const message = contactMessageField.value.trim();

                if (!name || !email || !message) {
                  setMessage("Please fill out your name, email, and message.", "error");
                  return;
                }

                contactSubmit.disabled = true;
                contactSubmit.textContent = "Sending...";
                setMessage("", "");

                try {
                  const response = await fetch(CONTACT_ENDPOINT, {
                    method: "POST",
                    headers: {
                      "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                      name: name,
                      email: email,
                      message: message,
                      company: contactCompany.value,
                      source: "github-pages-contact"
                    })
                  });

                  const result = await response.json();

                  if (!response.ok) {
                    setMessage(result.error || "Something went wrong. Please try again.", "error");
                    return;
                  }

                  setMessage("Thanks! Your message has been sent.", "success");
                  contactForm.reset();
                } catch (error) {
                  setMessage("Could not send your message. Please try again.", "error");
                } finally {
                  contactSubmit.disabled = false;
                  contactSubmit.textContent = "Send Message";
                }
              });
            </script>
          </div>

          <div class="coming-soon-visual" aria-label="Portrait of Jayne Reel">
            <figure class="coming-soon-portrait">
              <img src="assets/images/Jayne-headshot.jpeg" alt="Jayne Reel">
            </figure>
            <span class="daisy daisy-large" aria-hidden="true"></span>
            <span class="daisy daisy-small" aria-hidden="true"></span>
            <span class="daisy daisy-tiny" aria-hidden="true"></span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
